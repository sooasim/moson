<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="google" content="notranslate">
  <title>부업 파트너 신청 | MOSON.life</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    * { font-family: 'Pretendard', sans-serif; box-sizing: border-box; scroll-behavior: smooth; }
    :root { --moson-mint: #66c691; --moson-dark: #020617; --moson-navy: #1e3a8a; }
    body { margin:0; background: radial-gradient(circle at top, #ecfeff 0, #f9fafb 42%, #e5f4ff 100%); color:#020617; }
    .neon-box { background: rgba(255,255,255,0.96); border: 2px solid var(--moson-navy); border-radius: 24px; box-shadow: 6px 6px 0px var(--moson-mint); }
    .btn-mint { background: var(--moson-mint); color: #fff; font-weight: 800; border-radius: 999px; border: 2px solid var(--moson-navy); box-shadow: 4px 4px 0px var(--moson-navy); }
    .btn-mint:hover { transform: translate(-1px,-1px); box-shadow: 7px 7px 0px var(--moson-navy); }
    label { font-size:11px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:#94a3b8; display:block; margin-bottom:6px; }
    input { width:100%; padding:12px 14px; border-radius:16px; border:2px solid #e2e8f0; font-size:14px; font-weight:600; outline:none; }
    input:focus { border-color: var(--moson-mint); box-shadow: 0 0 0 1px rgba(102,198,145,0.35); }
  </style>
</head>
<body>
  <div class="min-h-screen flex flex-col">
    <header class="w-full border-b border-slate-200 bg-white/80 backdrop-blur-md">
      <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="{{ url_for('routes.landing') }}" class="flex items-center gap-2">
          <div class="text-2xl font-black tracking-tighter" style="color: var(--moson-navy);">MOSON<span style="color: var(--moson-mint);">.life</span></div>
          <span class="hidden sm:block text-[10px] text-slate-500 font-bold border-l border-slate-200 pl-3 ml-1">부업 파트너 신청</span>
        </a>
        <a href="{{ url_for('routes.landing') }}" class="text-xs font-bold text-slate-500 hover:text-emerald-500">메인 페이지로</a>
      </div>
    </header>

    <main class="flex-1 flex items-center justify-center py-12 px-4">
      <div class="max-w-3xl w-full">
        <div class="neon-box p-8 md:p-10">
          <div class="mb-8 text-center">
            <p class="text-[11px] font-black text-emerald-600 uppercase tracking-[0.18em] mb-3">Side Hustle Partner</p>
            <h1 class="text-3xl md:text-4xl font-black text-slate-900 mb-3">부업 파트너 신청</h1>
            <p class="text-sm md:text-[13px] text-slate-500 font-medium leading-relaxed">
              아래 내용을 남겨주시면, 모손라이프 운영진이 신청 내용을 확인 후<br class="hidden md:block"/>
              대리점(부업 파트너) 계정 개설 및 정산 구조를 안내드립니다.
            </p>
          </div>

          <form method="post" class="space-y-5">
            <div class="grid md:grid-cols-2 gap-5">
              <div>
                <label>대리점 주소 (서브도메인)</label>
                <input name="subdomain" placeholder="예: daelim01" pattern="[a-z0-9-]{2,32}" required>
              </div>
              <div>
                <label>업체명</label>
                <input name="company_name" placeholder="예: 대림통신" required>
              </div>
            </div>

            <div class="grid md:grid-cols-2 gap-5">
              <div>
                <label>대표자</label>
                <input name="representative" placeholder="예: 홍길동">
              </div>
              <div>
                <label>전화번호</label>
                <input name="phone" placeholder="예: 02-1234-5678 또는 010-1234-5678" required>
              </div>
            </div>

            <div class="grid md:grid-cols-2 gap-5">
              <div>
                <label>이메일</label>
                <input name="email" type="email" placeholder="정산/안내를 받을 이메일" required>
              </div>
              <div>
                <label>은행명</label>
                <input name="bank_name" placeholder="예: 국민은행">
              </div>
            </div>

            <div>
              <label>계좌번호</label>
              <input name="bank_account" placeholder="예: 123456-01-000000">
            </div>

            <div class="pt-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
              <p class="text-[11px] text-slate-400 font-bold uppercase tracking-[0.16em]">
                입력 완료 후 운영진이 신청 내용을 검토한 뒤, 대리점 계정을 개설해 드립니다.
              </p>
              <div class="flex gap-3 justify-end">
                <a href="{{ url_for('routes.landing') }}" class="px-4 py-3 rounded-full border border-slate-200 text-xs font-bold text-slate-500 bg-slate-50 hover:bg-slate-100">메인으로</a>
                <button type="submit" class="btn-mint px-6 py-3 text-xs md:text-sm uppercase tracking-[0.18em]">
                  입력 완료
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
