{% extends "admin/base.html" %}
{% block content %}
  <div class="card" style="margin-top:16px;margin-bottom:16px;">
    <h2 style="margin:0 0 8px 0;">어드민 계정 관리</h2>
    <p class="muted" style="margin:0 0 12px 0;font-size:12px;">
      마스터 권한에서만 접근 가능합니다. 상담사 권한은 <b>대리점 관리 / 정책표</b>를 열람만 할 수 있고, 마스터 권한은 모든 기능을 사용할 수 있습니다.
    </p>
    <form method="post" action="{{ url_for('routes.admin_user_create') }}" style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;align-items:end;">
      <div>
        <label>아이디</label>
        <input type="text" name="username" placeholder="아이디" required>
      </div>
      <div>
        <label>비밀번호</label>
        <input type="password" name="password" placeholder="비밀번호" required>
      </div>
      <div>
        <label>권한</label>
        <select name="role">
          <option value="consultant" selected>상담사 (기본)</option>
          <option value="master">마스터</option>
        </select>
      </div>
      <div style="grid-column:1 / -1;text-align:right;">
        <button type="submit">새 어드민 계정 생성 💾</button>
      </div>
    </form>
  </div>

  <div class="card" style="margin-top:16px;">
    <h2 style="margin:0 0 8px 0;">어드민 계정 목록</h2>
    <div class="scroll-panel">
      <table>
        <thead>
          <tr>
            <th style="width:60px;">ID</th>
            <th>아이디</th>
            <th style="width:120px;">권한</th>
            <th style="width:160px;">비밀번호 변경</th>
          </tr>
        </thead>
        <tbody>
          {% for u in users %}
            <tr>
              <td class="muted">{{ u.id }}</td>
              <td>{{ u.username }}</td>
              <td>
                <form method="post" action="{{ url_for('routes.admin_user_update', user_id=u.id) }}" style="display:flex;gap:6px;align-items:center;">
                  <select name="role" style="max-width:120px;">
                    <option value="consultant" {% if u.role == 'consultant' %}selected{% endif %}>상담사</option>
                    <option value="master" {% if u.role == 'master' %}selected{% endif %}>마스터</option>
                  </select>
              </td>
              <td>
                  <input type="password" name="new_password" placeholder="새 비밀번호(선택)" style="max-width:140px;">
                  <button type="submit" class="btn btn-xs">저장</button>
                </form>
              </td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
{% endblock %}
