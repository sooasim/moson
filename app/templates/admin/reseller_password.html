{% extends "admin/base.html" %}
{% block content %}
  <div class="card" style="max-width:520px;margin:24px auto;">
    <h2 style="margin:0 0 8px 0;">대리점 비밀번호 변경</h2>
    <p class="muted" style="margin:0 0 14px 0;font-size:13px;line-height:1.6;">
      대상 대리점: <b>{{ reseller.company_name }}</b> (<code style="font-size:11px;">{{ reseller.subdomain }}.{{ base_domain }}</code>)<br/>
      이 화면은 메인 어드민에서만 접근할 수 있습니다.
    </p>
    <form method="post">
      <label>새 비밀번호</label>
      <input name="new_password" type="password" placeholder="새 비밀번호를 입력하세요" required>

      <label>새 비밀번호 확인</label>
      <input name="new_password_confirm" type="password" placeholder="한 번 더 입력" required>

      <div style="display:flex;gap:10px;margin-top:18px;justify-content:flex-end;">
        <button type="submit">비밀번호 변경</button>
        <a href="{{ url_for('routes.admin_reseller_list') }}" class="btn-secondary" style="text-decoration:none;padding:10px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.14);">목록으로</a>
      </div>
    </form>
  </div>
{% endblock %}
