{% extends "admin/base.html" %}
{% block content %}
  <div class="card" style="max-width:560px;margin:22px auto;">
    <h2 style="margin:0 0 6px 0;">로그인</h2>
    <p class="muted" style="margin:0 0 14px 0;">
      {% if is_main_admin %}메인 어드민 로그인{% else %}대리점 어드민 로그인{% endif %}
    </p>
    <form method="post">
      <label>아이디</label>
      <input name="username" placeholder="{% if is_main_admin %}관리자 아이디{% else %}대리점 이메일{% endif %}" required>
      <label>비밀번호</label>
      <input name="password" type="password" required>
      <div style="display:flex;gap:10px;margin-top:14px;">
        <button type="submit">로그인</button>
        <a href="/" class="btn-secondary" style="text-decoration:none;padding:10px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.14);">사이트로</a>
      </div>
      {% if is_main_admin %}
      <p class="muted" style="margin-top:14px;font-size:12px;">
        기본값은 .env의 <b>MOSON_ADMIN_USERNAME</b>/<b>MOSON_ADMIN_PASSWORD</b> 입니다.
      </p>
      {% else %}
      <p class="muted" style="margin-top:14px;font-size:12px;">
        대리점 계정은 메인 어드민에서 생성됩니다. (대리점 이메일 + 초기 비밀번호)
      </p>
      {% endif %}
    </form>
  </div>
{% endblock %}
